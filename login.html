<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APMS - Login</title>
  <link rel="stylesheet" href="assets/css/admin.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      padding: 20px;
    }

    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-logo {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .login-subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .login-btn {
      width: 100%;
      margin-top: 10px;
    }

    .signup-link {
      text-align: center;
      margin-top: 20px;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .signup-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .signup-link a:hover {
      color: var(--primary-hover);
    }

    .theme-toggle-login {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--primary);
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      border: none;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .theme-toggle-login:hover {
      background: var(--primary-hover);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.9rem;
    }

    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .forgot-password {
      color: var(--primary);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s ease;
    }

    .forgot-password:hover {
      color: var(--primary-hover);
    }

    .success-message {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: var(--success);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <button class="theme-toggle-login" onclick="toggleTheme()">🌙 Dark</button>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">APMS</div>
        <p class="login-subtitle">Air Pollution Management System</p>
      </div>

      <div class="success-message" id="successMsg">✓ Login successful! Redirecting...</div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="you@example.com"
            required
            aria-label="Email address"
          >
          <div class="error-text" id="emailError"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="Enter your password"
            required
            aria-label="Password"
          >
          <div class="error-text" id="passwordError"></div>
        </div>

        <div class="checkbox-group">
          <label>
            <input type="checkbox" id="rememberMe" name="rememberMe">
            Remember me
          </label>
          <a href="#" class="forgot-password" onclick="event.preventDefault(); alert('Password reset feature coming soon!')">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary login-btn">Sign In</button>
      </form>

      <div class="signup-link">
        Don't have an account? <a href="signup.html">Create one</a>
      </div>
    </div>
  </div>

  <script>
    // Theme Toggle
    function toggleTheme() {
      let body = document.body;
      let btn = event.target;
      
      body.classList.toggle("light");
      
      if(body.classList.contains("light")) {
        localStorage.setItem("adminTheme", "light");
        btn.textContent = "☀️ Light";
      } else {
        localStorage.setItem("adminTheme", "dark");
        btn.textContent = "🌙 Dark";
      }
    }

    window.onload = function() {
      let theme = localStorage.getItem("adminTheme");
      let btn = document.querySelector(".theme-toggle-login");
      
      if(theme === "light") {
        document.body.classList.add("light");
        btn.textContent = "☀️ Light";
      } else {
        btn.textContent = "🌙 Dark";
      }
    }

    // Form Validation
    function validateEmail(email) {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return emailRegex.test(email);
    }

    function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const emailError = document.getElementById('emailError');
      const passwordError = document.getElementById('passwordError');
      const successMsg = document.getElementById('successMsg');
      
      // Clear previous errors
      emailError.textContent = '';
      passwordError.textContent = '';
      successMsg.style.display = 'none';
      
      let isValid = true;

      // Email validation
      if (!email) {
        emailError.textContent = '✗ Email is required';
        document.getElementById('email').classList.add('error');
        isValid = false;
      } else if (!validateEmail(email)) {
        emailError.textContent = '✗ Please enter a valid email';
        document.getElementById('email').classList.add('error');
        isValid = false;
      } else {
        document.getElementById('email').classList.remove('error');
      }

      // Password validation
      if (!password) {
        passwordError.textContent = '✗ Password is required';
        document.getElementById('password').classList.add('error');
        isValid = false;
      } else if (password.length < 6) {
        passwordError.textContent = '✗ Password must be at least 6 characters';
        document.getElementById('password').classList.add('error');
        isValid = false;
      } else {
        document.getElementById('password').classList.remove('error');
      }

      if (isValid) {
        // Show success message and redirect
        successMsg.style.display = 'block';
        
        // Store remember me preference
        if (document.getElementById('rememberMe').checked) {
          localStorage.setItem('rememberEmail', email);
        } else {
          localStorage.removeItem('rememberEmail');
        }

        // Redirect after 1.5 seconds
        setTimeout(() => {
          window.location.href = 'admin/dashboard.html';
        }, 1500);
      }
    }

    // Load remembered email
    window.addEventListener('load', function() {
      const rememberedEmail = localStorage.getItem('rememberEmail');
      if (rememberedEmail) {
        document.getElementById('email').value = rememberedEmail;
        document.getElementById('rememberMe').checked = true;
      }
    });
  </script>
</body>
</html>
