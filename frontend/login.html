<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Access | EcoMonitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="background-overlay"></div>

    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">🌿</div>
            <h1>EcoMonitor</h1>
            <p>Air Pollution Management System</p>
        </div>

        <div class="toggle-box">
            <button id="btn-login" class="toggle-btn active">Station Login</button>
            <button id="btn-register" class="toggle-btn">Register New Unit</button>
        </div>

        <form id="login-form" class="auth-form active-form" novalidate>
            <div class="input-group">
                <label for="login-email">Station ID / Email</label>
                <input type="email" id="login-email" name="email" placeholder="admin@ecomonitor.gov" required>
                <small class="error-msg"></small>
            </div>

            <div class="input-group">
                <label for="login-pass">Password</label>
                <input type="password" id="login-pass" name="password" placeholder="••••••••" required>
                <small class="error-msg"></small>
            </div>

            <button type="submit" class="submit-btn">Access Dashboard</button>
        </form>

        <form id="register-form" class="auth-form hidden-form" novalidate>
            
            <div class="input-group">
                <label>Administrator Name</label>
                <input type="text" id="reg-name" name="fullname" placeholder="Dr. Scientist" required>
                <small class="error-msg"></small>
            </div>

            <div class="input-group">
                <label>Official Email (Task 3)</label>
                <input type="email" id="reg-email" name="email" placeholder="name@gov.in" required>
                <small class="error-msg"></small>
            </div>

            <div class="input-group">
                <label>Emergency Contact (Task 4)</label>
                <input type="tel" id="reg-phone" name="phone" placeholder="9876543210" maxlength="10">
                <small class="error-msg"></small>
            </div>

            <div class="input-group">
                <label>Station UID (Project Specific)</label>
                <input type="text" id="reg-station" name="stationid" placeholder="ST-405" style="text-transform: uppercase;">
                <small class="error-msg"></small>
            </div>

            <div class="input-group">
                <label>Password (Task 4)</label>
                <input type="password" id="reg-pass" name="password" placeholder="Strong Password" required>
                <div class="strength-bar"><div id="strength-fill"></div></div>
                <small class="error-msg"></small>
            </div>

            <div class="input-group">
                <label>Confirm Password (Task 3)</label>
                <input type="password" id="reg-confirm" name="confirm" placeholder="Repeat Password" required>
                <small class="error-msg"></small>
            </div>

            <button type="submit" class="submit-btn">Register Station</button>
        </form>
    </div>

    <script src="auth.js"></script>
</body>
</html>
