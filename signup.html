<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - APMS</title>
  <link rel="stylesheet" href="assets/css/admin.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .signup-container {
      width: 100%;
      max-width: 500px;
      padding: 20px;
    }

    .signup-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .signup-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .signup-logo {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .signup-subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .login-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .login-link a:hover {
      color: var(--primary-hover);
    }

    .theme-toggle-signup {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--primary);
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      border: none;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .theme-toggle-signup:hover {
      background: var(--primary-hover);
    }

    .signup-btn {
      width: 100%;
      margin-top: 10px;
    }

    .password-requirements {
      background: rgba(56, 189, 248, 0.05);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 8px;
      padding: 12px;
      margin-top: 10px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .requirement-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }

    .requirement-check {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(56, 189, 248, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: transparent;
    }

    .requirement-check.met {
      background: rgba(16, 185, 129, 0.3);
      color: var(--success);
    }

    .terms-checkbox {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 15px 0;
    }

    .terms-checkbox input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      margin-top: 2px;
    }

    .terms-checkbox label {
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .terms-checkbox a {
      color: var(--primary);
      text-decoration: none;
    }

    .terms-checkbox a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .signup-card {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <button class="theme-toggle-signup" onclick="toggleTheme()">🌙 Dark</button>

  <div class="signup-container">
    <div class="signup-card">
      <div class="signup-header">
        <div class="signup-logo">APMS</div>
        <p class="signup-subtitle">Create your account</p>
      </div>

      <form id="signupForm" onsubmit="handleSignup(event)">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="firstName">First Name</label>
            <input 
              type="text" 
              id="firstName" 
              class="form-input" 
              placeholder="John"
              required
            >
            <div class="error-text" id="firstNameError"></div>
          </div>
          <div class="form-group">
            <label class="form-label" for="lastName">Last Name</label>
            <input 
              type="text" 
              id="lastName" 
              class="form-input" 
              placeholder="Doe"
              required
            >
            <div class="error-text" id="lastNameError"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="you@example.com"
            required
          >
          <div class="error-text" id="emailError"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="organization">Organization</label>
          <input 
            type="text" 
            id="organization" 
            class="form-input" 
            placeholder="Your Organization"
            required
          >
          <div class="error-text" id="organizationError"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="Enter a strong password"
            required
            onkeyup="checkPasswordStrength()"
          >
          <div class="error-text" id="passwordError"></div>
          <div class="password-requirements">
            <div class="requirement-item">
              <div class="requirement-check" id="req-length">✓</div>
              <span>At least 8 characters</span>
            </div>
            <div class="requirement-item">
              <div class="requirement-check" id="req-uppercase">✓</div>
              <span>One uppercase letter</span>
            </div>
            <div class="requirement-item">
              <div class="requirement-check" id="req-number">✓</div>
              <span>One number</span>
            </div>
            <div class="requirement-item">
              <div class="requirement-check" id="req-special">✓</div>
              <span>One special character (!@#$%^&*)</span>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input 
            type="password" 
            id="confirmPassword" 
            class="form-input" 
            placeholder="Re-enter your password"
            required
          >
          <div class="error-text" id="confirmPasswordError"></div>
        </div>

        <div class="terms-checkbox">
          <input 
            type="checkbox" 
            id="terms" 
            required
          >
          <label for="terms">
            I agree to the <a href="#" onclick="event.preventDefault();">Terms of Service</a> and <a href="#" onclick="event.preventDefault();">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary signup-btn">Create Account</button>
      </form>

      <div class="login-link">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    // Theme Toggle
    function toggleTheme() {
      let body = document.body;
      let btn = event.target;
      
      body.classList.toggle("light");
      
      if(body.classList.contains("light")) {
        localStorage.setItem("adminTheme", "light");
        btn.textContent = "☀️ Light";
      } else {
        localStorage.setItem("adminTheme", "dark");
        btn.textContent = "🌙 Dark";
      }
    }

    window.onload = function() {
      let theme = localStorage.getItem("adminTheme");
      let btn = document.querySelector(".theme-toggle-signup");
      
      if(theme === "light") {
        document.body.classList.add("light");
        btn.textContent = "☀️ Light";
      } else {
        btn.textContent = "🌙 Dark";
      }
    }

    // Password Strength Checker
    function checkPasswordStrength() {
      const password = document.getElementById('password').value;
      
      const checks = {
        length: password.length >= 8,
        uppercase: /[A-Z]/.test(password),
        number: /[0-9]/.test(password),
        special: /[!@#$%^&*]/.test(password)
      };

      Object.keys(checks).forEach(key => {
        const element = document.getElementById(`req-${key}`);
        if(checks[key]) {
          element.classList.add('met');
        } else {
          element.classList.remove('met');
        }
      });
    }

    // Email Validation
    function validateEmail(email) {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return emailRegex.test(email);
    }

    // Form Submission
    function handleSignup(e) {
      e.preventDefault();
      
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const organization = document.getElementById('organization').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const terms = document.getElementById('terms').checked;

      // Clear errors
      document.querySelectorAll('.error-text').forEach(el => el.textContent = '');

      let isValid = true;

      // First Name validation
      if (!firstName) {
        document.getElementById('firstNameError').textContent = '✗ First name is required';
        isValid = false;
      }

      // Last Name validation
      if (!lastName) {
        document.getElementById('lastNameError').textContent = '✗ Last name is required';
        isValid = false;
      }

      // Email validation
      if (!email) {
        document.getElementById('emailError').textContent = '✗ Email is required';
        isValid = false;
      } else if (!validateEmail(email)) {
        document.getElementById('emailError').textContent = '✗ Please enter a valid email';
        isValid = false;
      }

      // Organization validation
      if (!organization) {
        document.getElementById('organizationError').textContent = '✗ Organization is required';
        isValid = false;
      }

      // Password validation
      if (!password) {
        document.getElementById('passwordError').textContent = '✗ Password is required';
        isValid = false;
      } else if (password.length < 8) {
        document.getElementById('passwordError').textContent = '✗ Password must be at least 8 characters';
        isValid = false;
      } else if (!/[A-Z]/.test(password) || !/[0-9]/.test(password) || !/[!@#$%^&*]/.test(password)) {
        document.getElementById('passwordError').textContent = '✗ Password must meet all requirements';
        isValid = false;
      }

      // Confirm Password validation
      if (password !== confirmPassword) {
        document.getElementById('confirmPasswordError').textContent = '✗ Passwords do not match';
        isValid = false;
      }

      // Terms validation
      if (!terms) {
        alert('✗ You must agree to the terms and conditions');
        isValid = false;
      }

      if (isValid) {
        alert('✓ Account created successfully! Redirecting to login...');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
      }
    }
  </script>
</body>
</html>
